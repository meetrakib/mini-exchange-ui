# Dev only: hot reload via volume mount.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-exchange-ui
    ports:
      - "3003:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8002}
      - WATCHPACK_POLLING=1
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
